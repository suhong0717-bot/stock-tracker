<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="트래커">
<meta name="theme-color" content="#00e676">
<link rel="manifest" href="manifest.json">
<title>주식 팔로우 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg2: #0f1215;
    --bg3: #141820;
    --border: #1e2530;
    --green: #00e676;
    --green-dim: #00a854;
    --green-glow: rgba(0,230,118,0.12);
    --yellow: #ffd740;
    --yellow-dim: #c9a227;
    --red: #ff5252;
    --text: #c8d6e5;
    --text-dim: #5a6a7a;
    --accent: #00b4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.5px;
  }
  .header-left .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ratio-badge {
    background: var(--green-glow);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ratio-badge span { color: var(--text-dim); font-size: 11px; }

  /* Trade input panel */
  .trade-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .trade-panel h3 {
    width: 100%;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }
  .field label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .field select, .field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field select:focus, .field input:focus {
    border-color: var(--green-dim);
  }
  .field select option { background: var(--bg3); }

  .btn-buy {
    background: rgba(0,230,118,0.12);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
    align-self: flex-end;
    height: 38px;
  }
  .btn-buy:hover {
    background: rgba(0,230,118,0.22);
    box-shadow: 0 0 12px rgba(0,230,118,0.2);
  }
  .btn-sell {
    background: rgba(255,82,82,0.1);
    border: 1px solid #992222;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
    align-self: flex-end;
    height: 38px;
  }
  .btn-sell:hover {
    background: rgba(255,82,82,0.2);
    box-shadow: 0 0 12px rgba(255,82,82,0.2);
  }
  .btn-add-stock {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: flex-end;
    height: 38px;
  }
  .btn-add-stock:hover { border-color: var(--green-dim); color: var(--green); }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  thead tr {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 12px 14px;
    text-align: right;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  th:first-child { text-align: left; }
  tbody tr {
    border-bottom: 1px solid rgba(30,37,48,0.7);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,230,118,0.03); }
  td {
    padding: 11px 14px;
    text-align: right;
    color: var(--text);
    white-space: nowrap;
  }
  td:first-child {
    text-align: left;
    color: var(--green);
    font-weight: 500;
  }
  td.expert-qty { color: var(--yellow); }
  td.my-qty { color: var(--green); font-weight: 700; }
  td.ratio-neg { color: #ff8a65; }
  td.ratio-zero { color: var(--text-dim); }
  td.ratio-pos { color: var(--accent); }
  td.stock-name {
    cursor: pointer;
  }
  td.stock-name:hover { color: var(--yellow); }

  .flash-buy {
    animation: flashBuy 0.6s ease-out;
  }
  .flash-sell {
    animation: flashSell 0.6s ease-out;
  }
  @keyframes flashBuy {
    0% { background: rgba(0,230,118,0.25); }
    100% { background: transparent; }
  }
  @keyframes flashSell {
    0% { background: rgba(255,82,82,0.2); }
    100% { background: transparent; }
  }

  /* Delete btn */
  .btn-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-del:hover { color: var(--red); }



  /* Add stock modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 360px;
    max-width: 95vw;
  }
  .modal h3 {
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    font-size: 14px;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  .modal .field { margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-btns button { flex: 1; }

  .hidden { display: none !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--bg3);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 12px 20px;
    border-radius: 6px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .toast.error {
    border-color: var(--red);
    color: var(--red);
  }

  /* Empty row */
  .empty-row td {
    text-align: center;
    color: var(--text-dim);
    padding: 30px;
    font-size: 12px;
  }

  /* inline edit */
  .inline-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dim);
    color: var(--yellow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 70px;
    text-align: right;
    outline: none;
    padding: 2px 4px;
  }

  @media (max-width: 700px) {
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    th, td { padding: 9px 8px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>◈ FOLLOW TRACKER</h1>
      <div class="sub">전문가 주식 팔로우 · 자동 비율 계산</div>
    </div>
    <div class="ratio-badge">
      1/<input id="ratioInput" type="number" min="1" max="100" value="20"
        style="background:transparent;border:none;border-bottom:1px solid var(--green-dim);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;width:36px;text-align:center;outline:none;"
        oninput="updateRatio()">
      <span>팔로우 비율</span>
    </div>
  </div>

  <!-- Trade Input Panel -->
  <div class="trade-panel">
    <h3>▶ 거래 입력</h3>
    <div class="field">
      <label>종목</label>
      <select id="tradeStock"></select>
    </div>
    <div class="field" style="max-width:130px;">
      <label>미주은 수량</label>
      <input type="number" id="tradeQty" min="1" placeholder="수량 입력" />
    </div>
    <button class="btn-buy" onclick="executeTrade('buy')">▲ 매수</button>
    <button class="btn-sell" onclick="executeTrade('sell')">▼ 매도</button>
    <button class="btn-add-stock" onclick="openAddModal()">+ 종목 추가</button>
  </div>

  <!-- Photo Import Panel -->
  <div class="trade-panel" style="flex-direction:column; gap:14px;">
    <h3>📷 잔고 사진으로 자동 반영</h3>
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; width:100%;">
      <div class="field" style="flex:2; min-width:200px;">
        <label>Anthropic API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      </div>
      <div class="field" style="flex:1; min-width:160px;">
        <label>잔고 사진 업로드</label>
        <input type="file" id="photoInput" accept="image/*"
          style="background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 10px;border-radius:4px;width:100%;cursor:pointer;" />
      </div>
      <button class="btn-buy" id="analyzeBtn" onclick="analyzePhoto()" style="white-space:nowrap;">🔍 분석 &amp; 반영</button>
    </div>
    <div id="analyzeStatus" style="font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); display:none;"></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>종목명</th>
          <th>미주은</th>
          <th>내 잔고</th>
          <th>차이</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockTableBody"></tbody>
    </table>
  </div>

</div>

<!-- Add Stock Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h3>+ 종목 추가</h3>
    <div class="field">
      <label>종목명</label>
      <input type="text" id="newStockName" placeholder="예) 엔비디아" />
    </div>
    <div class="field">
      <label>미주은 수량</label>
      <input type="number" id="newStockQty" placeholder="0" min="0" />
    </div>
    <div class="modal-btns">
      <button class="btn-add-stock" onclick="closeModal()" style="height:38px;">취소</button>
      <button class="btn-buy" onclick="addStock()" style="height:38px;">추가</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let RATIO = 20; // 1/RATIO

let stocks = [
  { id: 1,  name: 'AMD',            expertQty: 186, myQty: 10 },
  { id: 2,  name: '크레도',          expertQty: 430, myQty: 22 },
  { id: 3,  name: '엔비디아',        expertQty: 345, myQty: 18 },
  { id: 4,  name: '샌디스크',        expertQty: 48,  myQty: 3  },
  { id: 5,  name: '마이크론',        expertQty: 90,  myQty: 5  },
  { id: 6,  name: '마벨 테크놀로지', expertQty: 344, myQty: 18 },
  { id: 7,  name: '버티브',          expertQty: 188, myQty: 10 },
  { id: 8,  name: 'GE버노바',        expertQty: 50,  myQty: 3  },
  { id: 9,  name: '블룸 에너지',     expertQty: 180, myQty: 9  },
  { id: 10, name: '하이닉스',        expertQty: 38,  myQty: 2  },
  { id: 11, name: 'ARM',            expertQty: 180, myQty: 9  },
  { id: 12, name: 'AAOI',           expertQty: 254, myQty: 13 },
  { id: 13, name: '루멘텀',          expertQty: 50,  myQty: 3  },
  { id: 14, name: '셀레스티카',      expertQty: 105, myQty: 6  },
  { id: 15, name: '브로드컴',        expertQty: 98,  myQty: 5  },
  { id: 16, name: '웨스턴 디지털',   expertQty: 88,  myQty: 5  },
  { id: 17, name: '코히런트',        expertQty: 100, myQty: 5  },
  { id: 18, name: '삼성전자',        expertQty: 180, myQty: 9  },
  { id: 19, name: 'TSMC ADR',       expertQty: 70,  myQty: 4  },
  { id: 20, name: '델 테크놀로지',   expertQty: 100, myQty: 5  },
];

let nextId = 21;

// ── Computed ────────────────────────────────────────────────────────────
function calcDiff(s) {
  return Math.round((s.expertQty / RATIO - s.myQty) * 100) / 100;
}

// ── Render ──────────────────────────────────────────────────────────────
function render() {
  renderTable();
  renderSelect();
}

function renderTable() {
  const tbody = document.getElementById('stockTableBody');
  if (stocks.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">종목이 없습니다. 종목을 추가해주세요.</td></tr>';
    return;
  }
  tbody.innerHTML = stocks.map(s => {
    const diff = calcDiff(s);
    const diffClass = diff > 0 ? 'ratio-pos' : diff < 0 ? 'ratio-neg' : 'ratio-zero';
    const diffText = diff > 0 ? `+${diff}` : `${diff}`;

    return `<tr id="row-${s.id}">
      <td class="stock-name" title="클릭하여 이름 편집" onclick="editName(${s.id})">${s.name}</td>
      <td class="expert-qty">
        <input class="inline-input" type="number" value="${s.expertQty}"
          onchange="updateExpert(${s.id}, this.value)" style="color:var(--yellow);">
      </td>
      <td>
        <input class="inline-input" type="number" value="${s.myQty}"
          onchange="updateMyQty(${s.id}, this.value)" style="color:var(--green);">
      </td>
      <td class="${diffClass}" style="font-weight:700;">${diff === 0 ? '0' : diffText}</td>
      <td><button class="btn-del" onclick="deleteStock(${s.id})" title="삭제">✕</button></td>
    </tr>`;
  }).join('');
}

function renderSelect() {
  const sel = document.getElementById('tradeStock');
  const prev = sel.value;
  sel.innerHTML = stocks.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join('');
  if (prev) sel.value = prev;
}

// ── Trade ───────────────────────────────────────────────────────────────
function executeTrade(type) {
  const stockId = parseInt(document.getElementById('tradeStock').value);
  const qty = parseInt(document.getElementById('tradeQty').value);

  if (!stockId || isNaN(qty) || qty <= 0) {
    showToast('종목과 수량을 올바르게 입력해주세요.', true);
    return;
  }

  const stock = stocks.find(s => s.id === stockId);
  if (!stock) return;

  const oldExpert = stock.expertQty;

  if (type === 'buy') {
    stock.expertQty += qty;
  } else {
    if (stock.expertQty - qty < 0) {
      showToast('미주은 잔고가 부족합니다.', true);
      return;
    }
    stock.expertQty -= qty;
  }

  render();

  // Flash row
  const row = document.getElementById(`row-${stockId}`);
  if (row) {
    row.classList.remove('flash-buy', 'flash-sell');
    void row.offsetWidth;
    row.classList.add(type === 'buy' ? 'flash-buy' : 'flash-sell');
  }

  const change = stock.expertQty - oldExpert;
  const sign = change >= 0 ? '+' : '';
  const diff = calcDiff(stock);
  showToast(`${stock.name} ${type === 'buy' ? '▲ 매수' : '▼ 매도'} — 미주은: ${stock.expertQty} (${sign}${change}) · 차이: ${diff}`);

  // Clear inputs
  document.getElementById('tradeQty').value = '';
}

// ── Inline Edit ─────────────────────────────────────────────────────────
function updateExpert(id, val) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) return;
  stock.expertQty = n;
  renderTable();
}

function updateMyQty(id, val) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) return;
  stock.myQty = n;
  renderTable();
}

function editName(id) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const newName = prompt('종목명 수정:', stock.name);
  if (newName && newName.trim()) {
    stock.name = newName.trim();
    render();
  }
}

// ── Add/Delete ───────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('newStockName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('newStockName').value = '';
  document.getElementById('newStockQty').value = '';
}

function addStock() {
  const name = document.getElementById('newStockName').value.trim();
  const qty = parseFloat(document.getElementById('newStockQty').value) || 0;

  if (!name) { showToast('종목명을 입력해주세요.', true); return; }

  stocks.push({
    id: nextId++,
    name,
    expertQty: qty,
    myQty: 0,
  });

  closeModal();
  render();
  showToast(`${name} 추가됨`);
}

function deleteStock(id) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  if (!confirm(`'${stock.name}' 을(를) 삭제할까요?`)) return;
  stocks = stocks.filter(s => s.id !== id);
  render();
  showToast(`${stock.name} 삭제됨`, false);
}

// ── Ratio ────────────────────────────────────────────────────────────────
function updateRatio() {
  const v = parseInt(document.getElementById('ratioInput').value);
  if (v && v > 0) {
    RATIO = v;
    // Recalc my qty for all
    stocks.forEach(s => { s.myQty = calcMyTarget(s.expertQty); });
    render();
  }
}

// ── Toast ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
}

// ── Photo Analysis ────────────────────────────────────────────────────────
async function analyzePhoto() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const fileInput = document.getElementById('photoInput');
  const status = document.getElementById('analyzeStatus');
  const btn = document.getElementById('analyzeBtn');

  if (!apiKey) { showToast('API Key를 입력해주세요.', true); return; }
  if (!fileInput.files[0]) { showToast('사진을 선택해주세요.', true); return; }

  // Read image as base64
  const file = fileInput.files[0];
  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej();
    r.readAsDataURL(file);
  });
  const mediaType = file.type || 'image/jpeg';

  // Show loading
  btn.disabled = true;
  btn.textContent = '분석 중...';
  status.style.display = 'block';
  status.style.color = 'var(--text-dim)';
  status.textContent = '⏳ AI가 사진을 읽는 중입니다...';

  const stockNames = stocks.map(s => s.name).join(', ');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: `이 주식 잔고 화면에서 종목명과 잔고수량을 추출해줘.
아래 종목 목록 중에 있는 것만 골라서, 반드시 JSON 배열 형식으로만 응답해. 다른 텍스트는 절대 쓰지 마.
형식: [{"name":"종목명","qty":수량}, ...]

추출 대상 종목 목록: ${stockNames}

주의: 종목명은 위 목록에 있는 이름 그대로 써줘.` }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(b => b.text || '').join('').trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    let updated = 0;
    let log = [];
    parsed.forEach(({ name, qty }) => {
      const stock = stocks.find(s => s.name === name);
      if (stock && qty >= 0) {
        stock.myQty = qty;
        updated++;
        log.push(`${name}: ${qty}`);
      }
    });

    render();
    status.style.color = 'var(--green)';
    status.textContent = `✅ ${updated}개 종목 반영 완료 — ${log.join(' · ')}`;
    showToast(`${updated}개 종목 내 잔고 업데이트 완료`);

  } catch (err) {
    status.style.color = 'var(--red)';
    status.textContent = `❌ 오류: ${err.message}`;
    showToast('분석 실패: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 분석 & 반영';
  }
}

// ── Modal click outside ──────────────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── PWA Service Worker ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/stock-tracker/sw.js');
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
