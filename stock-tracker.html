<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="트래커">
<meta name="theme-color" content="#00e676">
<link rel="manifest" href="manifest.json">
<title>주식 팔로우 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg2: #0f1215;
    --bg3: #141820;
    --border: #1e2530;
    --green: #00e676;
    --green-dim: #00a854;
    --green-glow: rgba(0,230,118,0.12);
    --yellow: #ffd740;
    --yellow-dim: #c9a227;
    --red: #ff5252;
    --text: #c8d6e5;
    --text-dim: #5a6a7a;
    --accent: #00b4ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,230,118,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,230,118,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.5px;
  }
  .header-left .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ratio-badge {
    background: var(--green-glow);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ratio-badge span { color: var(--text-dim); font-size: 11px; }

  /* Trade input panel */
  .trade-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .trade-panel h3 {
    width: 100%;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }
  .field label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .field select, .field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field select:focus, .field input:focus {
    border-color: var(--green-dim);
  }
  .field select option { background: var(--bg3); }

  .btn-buy {
    background: rgba(0,230,118,0.12);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
    align-self: flex-end;
    height: 38px;
  }
  .btn-buy:hover {
    background: rgba(0,230,118,0.22);
    box-shadow: 0 0 12px rgba(0,230,118,0.2);
  }
  .btn-sell {
    background: rgba(255,82,82,0.1);
    border: 1px solid #992222;
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
    align-self: flex-end;
    height: 38px;
  }
  .btn-sell:hover {
    background: rgba(255,82,82,0.2);
    box-shadow: 0 0 12px rgba(255,82,82,0.2);
  }
  .btn-add-stock {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: flex-end;
    height: 38px;
  }
  .btn-add-stock:hover { border-color: var(--green-dim); color: var(--green); }

  /* Table */
  .table-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  thead tr {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 12px 14px;
    text-align: right;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  th:first-child { text-align: left; }
  tbody tr {
    border-bottom: 1px solid rgba(30,37,48,0.7);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,230,118,0.03); }
  td {
    padding: 11px 14px;
    text-align: right;
    color: var(--text);
    white-space: nowrap;
  }
  td:first-child {
    text-align: left;
    color: var(--green);
    font-weight: 500;
  }
  td.expert-qty { color: var(--yellow); }
  td.my-qty { color: var(--green); font-weight: 700; }
  td.ratio-neg { color: #ff8a65; }
  td.ratio-zero { color: var(--text-dim); }
  td.ratio-pos { color: var(--accent); }
  td.stock-name {
    cursor: pointer;
  }
  td.stock-name:hover { color: var(--yellow); }

  .flash-buy {
    animation: flashBuy 0.6s ease-out;
  }
  .flash-sell {
    animation: flashSell 0.6s ease-out;
  }
  @keyframes flashBuy {
    0% { background: rgba(0,230,118,0.25); }
    100% { background: transparent; }
  }
  @keyframes flashSell {
    0% { background: rgba(255,82,82,0.2); }
    100% { background: transparent; }
  }

  /* Delete btn */
  .btn-del {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-del:hover { color: var(--red); }



  /* Add stock modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 360px;
    max-width: 95vw;
  }
  .modal h3 {
    font-family: 'JetBrains Mono', monospace;
    color: var(--green);
    font-size: 14px;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  .modal .field { margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-btns button { flex: 1; }

  .hidden { display: none !important; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 14px 20px 0 20px;
    border-radius: 10px;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    min-width: 260px;
    max-width: 90vw;
    overflow: hidden;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .toast.error {
    border-color: var(--red);
    color: var(--red);
  }
  .toast-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    gap: 14px;
  }
  .toast-undo-btn {
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .toast-undo-btn:hover { opacity: 0.8; }
  .toast-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.1);
    margin: 0 -20px;
  }
  .toast-bar {
    height: 3px;
    background: var(--green);
    width: 100%;
    transform-origin: left;
  }
  .toast-bar.running {
    animation: barShrink 5s linear forwards;
  }
  .toast.error .toast-bar { background: var(--red); }
  @keyframes barShrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* Empty row */
  .empty-row td {
    text-align: center;
    color: var(--text-dim);
    padding: 30px;
    font-size: 12px;
  }

  /* inline edit */
  .inline-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dim);
    color: var(--yellow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    width: 70px;
    text-align: right;
    outline: none;
    padding: 2px 4px;
  }

  @media (max-width: 700px) {
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    th, td { padding: 9px 8px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>◈ FOLLOW TRACKER</h1>
      <div class="sub">전문가 주식 팔로우 · 자동 비율 계산</div>
    </div>
    <div class="ratio-badge">
      1/<input id="ratioInput" type="number" min="1" max="100" value="20"
        style="background:transparent;border:none;border-bottom:1px solid var(--green-dim);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;width:36px;text-align:center;outline:none;"
        oninput="updateRatio()">
      <span>팔로우 비율</span>
    </div>
  </div>

  <!-- Trade Input Panel -->
  <div class="trade-panel">
    <h3>▶ 거래 입력</h3>
    <div class="field">
      <label>종목</label>
      <select id="tradeStock"></select>
    </div>
    <div class="field" style="max-width:130px;">
      <label>미주은 수량</label>
      <input type="number" id="tradeQty" min="1" placeholder="수량 입력" />
    </div>
    <button class="btn-buy" onclick="executeTrade('buy')">▲ 매수</button>
    <button class="btn-sell" onclick="executeTrade('sell')">▼ 매도</button>
    <button class="btn-add-stock" onclick="openAddModal()">+ 종목 추가</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>종목명 (<span id="stockCount">0</span>)</th>
          <th>미주은</th>
          <th>내 잔고</th>
          <th>차이</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stockTableBody"></tbody>
    </table>
  </div>

</div>

<!-- Add Stock Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h3>+ 종목 추가</h3>
    <div class="field">
      <label>종목명</label>
      <input type="text" id="newStockName" placeholder="예) 엔비디아" />
    </div>
    <div class="field">
      <label>미주은 수량</label>
      <input type="number" id="newStockQty" placeholder="0" min="0" />
    </div>
    <div class="modal-btns">
      <button class="btn-add-stock" onclick="closeModal()" style="height:38px;">취소</button>
      <button class="btn-buy" onclick="addStock()" style="height:38px;">추가</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-body">
    <span id="toastMsg"></span>
    <button class="toast-undo-btn" id="undoBtn" onclick="undoDelete()" style="display:none;">↩ 되돌리기</button>
  </div>
  <div class="toast-bar-wrap">
    <div class="toast-bar" id="toastBar"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let RATIO = 20; // 1/RATIO

let stocks = [
  { id: 1,  name: 'AMD',            expertQty: 186, myQty: 10 },
  { id: 2,  name: '크레도',          expertQty: 430, myQty: 22 },
  { id: 3,  name: '엔비디아',        expertQty: 345, myQty: 18 },
  { id: 4,  name: '샌디스크',        expertQty: 48,  myQty: 3  },
  { id: 5,  name: '마이크론',        expertQty: 90,  myQty: 5  },
  { id: 6,  name: '마벨 테크놀로지', expertQty: 344, myQty: 18 },
  { id: 7,  name: '버티브',          expertQty: 188, myQty: 10 },
  { id: 8,  name: 'GE버노바',        expertQty: 50,  myQty: 3  },
  { id: 9,  name: '블룸 에너지',     expertQty: 180, myQty: 9  },
  { id: 10, name: '하이닉스',        expertQty: 38,  myQty: 2  },
  { id: 11, name: 'ARM',            expertQty: 180, myQty: 9  },
  { id: 12, name: 'AAOI',           expertQty: 254, myQty: 13 },
  { id: 13, name: '루멘텀',          expertQty: 50,  myQty: 3  },
  { id: 14, name: '셀레스티카',      expertQty: 105, myQty: 6  },
  { id: 15, name: '브로드컴',        expertQty: 98,  myQty: 5  },
  { id: 16, name: '웨스턴 디지털',   expertQty: 88,  myQty: 5  },
  { id: 17, name: '코히런트',        expertQty: 100, myQty: 5  },
  { id: 18, name: '삼성전자',        expertQty: 180, myQty: 9  },
  { id: 19, name: 'TSMC ADR',       expertQty: 70,  myQty: 4  },
  { id: 20, name: '델 테크놀로지',   expertQty: 100, myQty: 5  },
];

let nextId = 21;

// ── Computed ────────────────────────────────────────────────────────────
function calcDiff(s) {
  return Math.round((s.expertQty / RATIO - s.myQty) * 100) / 100;
}

// ── Render ──────────────────────────────────────────────────────────────
function render() {
  renderTable();
  renderSelect();
  saveData();
}

function renderTable() {
  const tbody = document.getElementById('stockTableBody');
  document.getElementById('stockCount').textContent = stocks.length;
  if (stocks.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">종목이 없습니다. 종목을 추가해주세요.</td></tr>';
    return;
  }
  tbody.innerHTML = stocks.map(s => {
    const diff = calcDiff(s);
    const diffClass = diff > 0 ? 'ratio-pos' : diff < 0 ? 'ratio-neg' : 'ratio-zero';
    const diffText = diff > 0 ? `+${diff}` : `${diff}`;

    return `<tr id="row-${s.id}">
      <td class="stock-name" title="클릭하여 이름 편집" onclick="editName(${s.id})">${s.name}</td>
      <td class="expert-qty">
        <input class="inline-input" type="number" value="${s.expertQty}"
          onchange="updateExpert(${s.id}, this.value)" style="color:var(--yellow);">
      </td>
      <td>
        <input class="inline-input" type="number" value="${s.myQty}"
          onchange="updateMyQty(${s.id}, this.value)" style="color:var(--green);">
      </td>
      <td class="${diffClass}" style="font-weight:700;">${diff === 0 ? '0' : diffText}</td>
      <td><button class="btn-del" onclick="deleteStock(${s.id})" title="삭제">✕</button></td>
    </tr>`;
  }).join('');
}

function renderSelect() {
  const sel = document.getElementById('tradeStock');
  const prev = sel.value;
  sel.innerHTML = stocks.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join('');
  if (prev) sel.value = prev;
}

// ── Trade ───────────────────────────────────────────────────────────────
function executeTrade(type) {
  const stockId = parseInt(document.getElementById('tradeStock').value);
  const qty = parseInt(document.getElementById('tradeQty').value);

  if (!stockId || isNaN(qty) || qty <= 0) {
    showToast('종목과 수량을 올바르게 입력해주세요.', true);
    return;
  }

  const stock = stocks.find(s => s.id === stockId);
  if (!stock) return;

  const oldExpert = stock.expertQty;

  if (type === 'buy') {
    stock.expertQty += qty;
  } else {
    if (stock.expertQty - qty < 0) {
      showToast('미주은 잔고가 부족합니다.', true);
      return;
    }
    stock.expertQty -= qty;
  }

  render();

  // Flash row
  const row = document.getElementById(`row-${stockId}`);
  if (row) {
    row.classList.remove('flash-buy', 'flash-sell');
    void row.offsetWidth;
    row.classList.add(type === 'buy' ? 'flash-buy' : 'flash-sell');
  }

  const change = stock.expertQty - oldExpert;
  const sign = change >= 0 ? '+' : '';
  const diff = calcDiff(stock);
  showToast(`${stock.name} ${type === 'buy' ? '▲ 매수' : '▼ 매도'} — 미주은: ${stock.expertQty} (${sign}${change}) · 차이: ${diff}`);

  // Clear inputs
  document.getElementById('tradeQty').value = '';
}

// ── Inline Edit ─────────────────────────────────────────────────────────
function updateExpert(id, val) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) return;
  stock.expertQty = n;
  renderTable();
}

function updateMyQty(id, val) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) return;
  stock.myQty = n;
  renderTable();
}

function editName(id) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  const newName = prompt('종목명 수정:', stock.name);
  if (newName && newName.trim()) {
    stock.name = newName.trim();
    render();
  }
}

// ── Add/Delete ───────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('newStockName').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('newStockName').value = '';
  document.getElementById('newStockQty').value = '';
}

function addStock() {
  const name = document.getElementById('newStockName').value.trim();
  const qty = parseFloat(document.getElementById('newStockQty').value) || 0;

  if (!name) { showToast('종목명을 입력해주세요.', true); return; }

  stocks.push({
    id: nextId++,
    name,
    expertQty: qty,
    myQty: 0,
  });

  closeModal();
  render();
  showToast(`${name} 추가됨`);
}

function deleteStock(id) {
  const stock = stocks.find(s => s.id === id);
  if (!stock) return;
  stocks = stocks.filter(s => s.id !== id);
  render();
  showUndoToast(stock);
}

let undoStock = null;
let undoTimer = null;
let undoCountTimer = null;

function showUndoToast(stock) {
  undoStock = stock;
  const btn = document.getElementById('undoBtn');
  const bar = document.getElementById('toastBar');
  btn.style.display = 'inline';

  clearInterval(undoCountTimer);
  clearTimeout(undoTimer);

  // reset & restart bar animation
  bar.className = 'toast-bar';
  void bar.offsetWidth;
  bar.className = 'toast-bar running';

  showToast(`${stock.name} 삭제됨`);

  undoTimer = setTimeout(() => {
    btn.style.display = 'none';
    undoStock = null;
    document.getElementById('toast').className = 'toast';
  }, 5000);
}

function undoDelete() {
  if (!undoStock) return;
  clearTimeout(undoTimer);
  clearInterval(undoCountTimer);
  const restored = undoStock;
  stocks.push(restored);
  stocks.sort((a, b) => a.id - b.id);
  document.getElementById('undoBtn').style.display = 'none';
  document.getElementById('toast').className = 'toast';
  undoStock = null;
  render();
  showToast('↩ ' + restored.name + ' 복구됨');
}

// ── Ratio ────────────────────────────────────────────────────────────────
function updateRatio() {
  const v = parseInt(document.getElementById('ratioInput').value);
  if (v && v > 0) {
    RATIO = v;
    render();
  }
}

// ── Toast ────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  const bar = document.getElementById('toastBar');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  if (!undoStock) {
    bar.className = 'toast-bar';
    void bar.offsetWidth;
    bar.className = 'toast-bar running';
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
  }
}

// ── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'stock-tracker-data';

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ stocks, RATIO, nextId }));
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.stocks) stocks = data.stocks;
      if (data.RATIO) { RATIO = data.RATIO; document.getElementById('ratioInput').value = RATIO; }
      if (data.nextId) nextId = data.nextId;
    }
  } catch(e) {}
}

// ── Modal click outside ──────────────────────────────────────────────────
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── PWA Service Worker ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/stock-tracker/sw.js');
}

// ── Init ──────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
